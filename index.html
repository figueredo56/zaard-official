<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD INNOVATION - Oficial</title>
    <style>
        :root {
            --gold: #d4af37;
            /* IMAGEN DE FONDO (La horizontal espacial) */
            --bg-image: url('https://gateway.pinata.cloud/ipfs/bafybeidtruvvmesv453nctol23nrn2v7sqt4s75vdydzy4doxrqs32x45i');
        }
        body {
            margin: 0;
            padding: 0;
            color: #eee;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .container {
            padding: 40px 15px;
            max-width: 900px;
            margin: 0 auto;
        }
        /* EL ESCUDO (Imagen Principal) */
        .hero-img {
            width: 100%;
            max-width: 450px;
            border-radius: 50%; /* Si el escudo es redondo, esto lo resalta */
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.6);
            border: 3px solid var(--gold);
            margin-bottom: 20px;
            animation: pulse 3s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 60px rgba(212, 175, 55, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); }
        }
        .gold {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 6px;
            text-shadow: 0 0 20px var(--gold);
            margin: 15px 0;
        }
        .section {
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 30px;
            border-radius: 20px;
            margin: 30px 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
        }
        .btn {
            background: linear-gradient(135deg, var(--gold) 0%, #8d6b00 100%);
            color: #000;
            padding: 18px 45px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2em;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            border: none;
        }
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 40px var(--gold);
        }
        .arcade-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .arcade-gallery img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: 0.4s;
        }
        .arcade-gallery img:hover {
            border-color: var(--gold);
            transform: scale(1.05);
        }
        .links a {
            color: #4facfe;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }
        footer {
            padding: 50px 20px;
            color: #666;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://gateway.pinata.cloud/ipfs/bafybeihmzzhikxn6f4xctz6betwprnupyq4f6kw3233vwnagcomraiftoy" alt="ZAARD Shield" class="hero-img">
        
        <h1 class="gold">ZAARD INNOVATION</h1>
        <p style="letter-spacing: 2px; color: #bbb;">Protocolo Arcade Web3 • Binance Smart Chain</p>

        <a href="https://bscscan.com/token/0xd9e66399a7017c6fb5b624d491bb96a4a736d2bb" class="btn">
            EXPLORAR ZAARD.2
        </a>

        <div class="section">
            <h2 class="gold">Seguridad Inmutable</h2>
            <p>Ecosistema gaming protegido por ZAARD Vault y contratos inteligentes verificados.</p>
            <div class="links">
                <a href="https://app.binance.com/uni-qr/cpro/PANGA">Binance Square</a>
                <a href="https://x.com/ZAARD_666">X (Twitter)</a>
            </div>
        </div>

        <h3 class="gold">Galería del Ecosistema</h3>
        <div class="arcade-gallery">
            <img src="https://gateway.pinata.cloud/ipfs/bafybeiefhnawny7nlgixveiia7aaougqxsird6or4nws52vp36ndbfvixa">
            <img src="https://gateway.pinata.cloud/ipfs/bafybeift764exak3gtcylewcd5mufkfaxabusywobwg2z5mcfkp7qeaapy">
            <img src="https://gateway.pinata.cloud/ipfs/bafybeih6tajfywto7pghngsh4ndbedymzwxejnjbmghu2xisvl7hjxsizu">
        </div>

        <footer>
            <p>&copy; 2026 ZAARD INNOVATION | Created by Panga</p>
        </footer>
    </div>
</body>
</html>
